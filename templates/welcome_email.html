<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      background: #ffffff;
      margin: 40px auto;
      padding: 25px;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
    }
    .header {
      font-size: 22px;
      font-weight: 600;
      color: #222;
      margin-bottom: 15px;
    }
    .content {
      font-size: 16px;
      color: #444;
      line-height: 1.6;
    }
    .footer {
      margin-top: 30px;
      text-align: center;
      font-size: 14px;
      color: #7c7c7c;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Welcome to Our Service</div>
    <div class="content">
      <p>Hello,</p>
      <p>Thank you for joining us. We are happy to have you here.</p>
      <p>Let us know if you need help. Our support team is always ready.</p>
    </div>
    <div class="footer">
      © 2025 CHIKO. All rights reserved.
    </div>
  </div>
</body>
</html>
