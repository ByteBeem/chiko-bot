<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  body { background:#0d0f12; margin:0; padding:0; font-family:Inter,Arial,sans-serif; color:#e6e6e6; }
  .wrap { max-width:600px; margin:40px auto; background:#14161a; padding:30px; border-radius:12px; border:1px solid #1f2226; }
  .title { font-size:22px; color:#00ffd5; margin-bottom:15px; }
  .text { font-size:16px; line-height:1.6; color:#cfcfcf; }
  .footer { margin-top:30px; text-align:center; font-size:13px; color:#6c757d; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="title">Daily Summary</div>
    <div class="text">
      <p>Hello {{USERNAME}},</p>
      <p>{{MESSAGE_CONTENT}}</p>
      <p>You are growing. Stay aware and stay steady.</p>
      <p>– Your AI Companion</p>
    </div>
    <div class="footer">Generated with intelligence and awareness.</div>
  </div>
</body>
</html>
